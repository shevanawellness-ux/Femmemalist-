/* STORAGE KEYS */
const doneKey = "done_" + todayKey;
const streakKey = "streak_count";
const lastDateKey = "last_done_date";

/* LOAD STATE */
let streak = parseInt(localStorage.getItem(streakKey)) || 0;
let lastDate = localStorage.getItem(lastDateKey);

/* IF ALREADY DONE TODAY */
if(localStorage.getItem(doneKey) === "true"){
  checkbox.checked = true;
  checkbox.disabled = true;
  label.innerText = "Completed ✔";
  label.style.color = "#4CAF50";
}

/* FUNCTION: CHECK IF YESTERDAY */
function isYesterday(dateStr){
  const d = new Date(dateStr);
  const yest = new Date();
  yest.setDate(yest.getDate() - 1);

  return d.toDateString() === yest.toDateString();
}

/* EVENT */
checkbox.addEventListener("change", function(){

  if(!checkbox.checked) return;

  if(localStorage.getItem(doneKey) === "true" || window.completedFromApp){
    checkbox.checked = true;
    checkbox.disabled = true;
    return;
  }

  /* ✅ SAVE TODAY */
  localStorage.setItem(doneKey,"true");

  /* ✅ STREAK LOGIC */
  if(lastDate){
    if(isYesterday(lastDate)){
      streak += 1; // continue streak
    } else if(lastDate === todayKey){
      // same day → do nothing
    } else {
      streak = 1; // reset streak
    }
  } else {
    streak = 1;
  }

  localStorage.setItem(streakKey, streak);
  localStorage.setItem(lastDateKey, todayKey);

  /* ✅ UI UPDATE */
  checkbox.disabled = true;
  label.innerText = "Completed ✔";
  label.style.color = "#4CAF50";

  /* ✅ APP INVENTOR SYNC */
  setTimeout(()=>{

    const message =
      "TASK_DONE|" + index + "|" + encodeURIComponent(task) + "|" + todayKey + "|" + streak;

    const notification =
      "SHOW_NOTIFICATION|Streak Updated 🔥|Current streak: " + streak;

    if(window.AppInventor && window.AppInventor.setWebViewString){
      window.AppInventor.setWebViewString(message);

      setTimeout(()=>{
        window.AppInventor.setWebViewString(notification);
      },500);
    }

  },500);

});
  </script>
